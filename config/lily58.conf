# Uncomment to enable encoder
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment the following line to enable the Lily58 OLED Display
# CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Enable ZMK Studio
CONFIG_ZMK_STUDIO=y

# Eager debounce: register press near-instantly, debounce release
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Larger queue for fast cross-half typing bursts
CONFIG_ZMK_SPLIT_BLE_CENTRAL_POSITION_QUEUE_SIZE=10

# Deep sleep (disconnects BLE, drops to ~20uA after idle timeout)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000

# Blank display during idle
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

# DCDC fix (prevents excess current on nice!nano v2)
CONFIG_BOARD_ENABLE_DCDC_HV=n